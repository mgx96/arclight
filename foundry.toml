[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.30"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read", path = "./" }]

[rpc_endpoints]
# Use with: forge script ... --rpc-url arc_testnet
# Public RPC, no API key, so a literal URL is safe to commit. If you later switch to a keyed
# provider, replace this with "${ARC_TESTNET_RPC_URL}" and keep the keyed URL in a gitignored .env.
arc_testnet = "https://rpc.testnet.arc.network"

[profile.viair]
via_ir = true

[fuzz]
runs = 512

[invariant]
runs = 256
depth = 128
fail_on_revert = false
call_override = false

[fmt]
line_length = 120
tab_width = 4
quote_style = "double"
number_underscore = "thousands"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
