# esbuild is a transitive dep; tsx ships its own copy, so its build script is irrelevant here.
# Approve it so pnpm 11 doesn't exit 1 on the "ignored build scripts" check during install,
# and disable the pre-run dep check that otherwise trips the same warning before `pnpm run <script>`.
onlyBuiltDependencies:
  - esbuild
verifyDepsBeforeRun: false
