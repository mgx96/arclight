# sharp + unrs-resolver native builds are not needed for `next dev`; acknowledge them as ignored
# and disable pnpm 11's pre-run install check so `pnpm dev/build` don't fail on the warning.
ignoredBuiltDependencies:
  - sharp
  - unrs-resolver
verifyDepsBeforeRun: false
# A fresh `pnpm install` (e.g. in CI) otherwise exits 1 just because the builds above were
# ignored; we have already decided to skip them, so don't fail the install over it.
strictDepBuilds: false
